<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Akáshico - Admin E-mails</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #667eea;
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 32px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .btn-secondary {
      background: #10b981;
    }
    
    .btn-secondary:hover {
      background: #059669;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    
    th {
      background: #f9fafb;
      color: #374151;
      font-weight: 600;
      font-size: 14px;
    }
    
    tr:hover {
      background: #f9fafb;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .spinner {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>📧 E-mails Coletados</h1>
      <p class="subtitle">Base de dados para mala direta e campanhas de marketing</p>
      
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="totalEmails">0</div>
          <div class="stat-label">E-mails Cadastrados</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="lastUpdate">--</div>
          <div class="stat-label">Última Atualização</div>
        </div>
      </div>
      
      <div class="actions">
        <button onclick="loadEmails()">🔄 Atualizar Lista</button>
        <button class="btn-secondary" onclick="downloadCSV()">⬇️ Baixar CSV</button>
        <button class="btn-secondary" onclick="copyEmails()">📋 Copiar E-mails</button>
      </div>
      
      <div id="content">
        <div class="loading">
          <div class="spinner"></div>
          <div>Carregando e-mails...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let emailsData = null;

    async function loadEmails() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Carregando e-mails...</div></div>';
      
      try {
        const response = await fetch('/api/save-email');
        const data = await response.json();
        
        emailsData = data;
        document.getElementById('totalEmails').textContent = data.count || 0;
        
        if (data.emails && data.emails.length > 0) {
          const lastEmail = data.emails[data.emails.length - 1];
          const lastDate = new Date(lastEmail.data);
          document.getElementById('lastUpdate').textContent = lastDate.toLocaleDateString('pt-BR');
          
          renderTable(data.emails);
        } else {
          content.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📭</div>
              <h3>Nenhum e-mail cadastrado ainda</h3>
              <p>Os e-mails serão salvos automaticamente quando os consulentes enviarem suas leituras.</p>
            </div>
          `;
        }
      } catch (error) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-icon">⚠️</div>
            <h3>Erro ao carregar e-mails</h3>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    function renderTable(emails) {
      const content = document.getElementById('content');
      const html = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>E-mail</th>
              <th>Nome</th>
              <th>Data de Cadastro</th>
            </tr>
          </thead>
          <tbody>
            ${emails.map((item, index) => `
              <tr>
                <td>${index + 1}</td>
                <td>${item.email}</td>
                <td>${item.nome}</td>
                <td>${new Date(item.data).toLocaleString('pt-BR')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      content.innerHTML = html;
    }

    function downloadCSV() {
      if (!emailsData || !emailsData.csv) {
        alert('Nenhum dado disponível para download');
        return;
      }
      
      const blob = new Blob([emailsData.csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `portal-akashico-emails-${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    function copyEmails() {
      if (!emailsData || !emailsData.emails) {
        alert('Nenhum e-mail disponível');
        return;
      }
      
      const emailList = emailsData.emails.map(item => item.email).join(', ');
      navigator.clipboard.writeText(emailList).then(() => {
        alert(`${emailsData.emails.length} e-mails copiados para a área de transferência!`);
      }).catch(err => {
        alert('Erro ao copiar: ' + err.message);
      });
    }

    // Carregar automaticamente ao abrir a página
    loadEmails();
  </script>
</body>
</html>
