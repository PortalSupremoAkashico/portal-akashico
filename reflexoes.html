<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reflexões Akáshicas — Portal dos Registros Akáshicos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#05040f;--bg-card:rgba(14,12,28,.9);--accent:#a78bfa;--accent-bright:#c4b5fd;--gold:#f0c96b;--gold-dim:rgba(240,201,107,.6);--border:rgba(196,181,253,.13);--text:#ede9ff;--muted:rgba(196,181,253,.55);--radius:20px;--font-display:'Cinzel',serif;--font-body:'Cormorant Garamond',serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:18px;line-height:1.8;}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.container{width:min(860px,calc(100% - 32px));margin:0 auto;padding:32px 0 80px;position:relative;z-index:1;}
.nav-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.nav-link{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:.65rem;letter-spacing:.12em;color:var(--muted);text-decoration:none;padding:8px 18px;border:1px solid rgba(196,181,253,.15);border-radius:50px;transition:all .25s;background:rgba(5,4,15,.4);backdrop-filter:blur(8px);}
.nav-link:hover{color:#fff;border-color:rgba(196,181,253,.5);}
.hero{text-align:center;margin-bottom:40px;}
.hero-badge{font-family:var(--font-display);font-size:.58rem;letter-spacing:.25em;color:var(--gold-dim);margin-bottom:14px;}
.hero-title{font-family:var(--font-display);font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:700;color:var(--accent-bright);margin-bottom:8px;text-shadow:0 0 40px rgba(167,139,250,.3);}
.hero-sub{font-size:1rem;color:var(--muted);font-style:italic;}
.btn-gerar{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;font-family:var(--font-display);font-size:.78rem;letter-spacing:.12em;font-weight:600;color:var(--gold);background:linear-gradient(135deg,rgba(240,201,107,.15),rgba(240,201,107,.07));border:1px solid rgba(240,201,107,.5);border-radius:50px;cursor:pointer;transition:all .3s;margin-top:20px;}
.btn-gerar:hover{background:linear-gradient(135deg,rgba(240,201,107,.28),rgba(240,201,107,.14));border-color:rgba(240,201,107,.85);box-shadow:0 0 32px rgba(240,201,107,.3);transform:translateY(-2px);}
.btn-gerar:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.spinner-wrap{display:none;justify-content:center;align-items:center;gap:14px;padding:32px;color:var(--muted);font-family:var(--font-display);font-size:.7rem;letter-spacing:.15em;}
.spinner-wrap.ativo{display:flex;}
.spinner{width:32px;height:32px;border:2px solid rgba(196,181,253,.1);border-top-color:rgba(196,181,253,.7);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.reflexoes-grid{display:flex;flex-direction:column;gap:20px;}
.reflexao-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.4);opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;position:relative;overflow:hidden;}
.reflexao-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,201,107,.25),transparent);}
.reflexao-card.visivel{opacity:1;transform:translateY(0);}
.reflexao-num{font-family:var(--font-display);font-size:.55rem;letter-spacing:.2em;color:rgba(240,201,107,.3);margin-bottom:16px;}
.reflexao-texto{font-size:1.2rem;line-height:2;color:rgba(235,230,255,.94);font-style:italic;margin-bottom:20px;position:relative;padding-left:20px;}
.reflexao-texto::before{content:'"';position:absolute;left:0;top:-8px;font-size:3rem;color:rgba(240,201,107,.15);font-family:Georgia,serif;line-height:1;}
.reflexao-autor-wrap{display:flex;align-items:center;gap:12px;}
.reflexao-sep{flex:1;height:1px;background:linear-gradient(90deg,rgba(196,181,253,.15),transparent);}
.reflexao-autor{font-family:var(--font-display);font-size:.72rem;letter-spacing:.1em;color:var(--gold-dim);text-align:right;}
.reflexao-origem{font-size:.75rem;color:var(--muted);text-align:right;margin-top:2px;font-style:italic;}
.rodape{text-align:center;padding:32px 0 0;opacity:0;transition:opacity 1s;}
.rodape.visivel{opacity:1;}
.rodape-sep{font-family:var(--font-display);font-size:.6rem;letter-spacing:.3em;color:rgba(196,181,253,.2);}
@media(max-width:600px){.reflexao-card{padding:20px;}.reflexao-texto{font-size:1.05rem;}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="container">
  <div class="nav-top">
    <a href="/perfil" class="nav-link">← Meu Perfil</a>
    <button id="btnNova" class="btn-gerar" onclick="buscarReflexoes()" disabled>↺ Novas Reflexões</button>
  </div>

  <div class="hero">
    <div class="hero-badge">✦ Sabedoria Universal ✦</div>
    <h1 class="hero-title">Reflexões Akáshicas</h1>
    <p class="hero-sub">Palavras que atravessaram o tempo para chegar até você agora</p>
    <button class="btn-gerar" id="btnBuscar" onclick="buscarReflexoes()">✦ Revelar Reflexões</button>
  </div>

  <div class="spinner-wrap" id="spinnerWrap">
    <div class="spinner"></div>
    <span id="spinnerTxt">Consultando os mestres...</span>
  </div>

  <div class="reflexoes-grid" id="reflexoesGrid"></div>

  <div class="rodape" id="rodape">
    <div class="rodape-sep">✦ ✦ ✦</div>
  </div>
</div>

<script>
// Canvas cósmico simples
(function() {
  var c = document.getElementById('bgCanvas');
  var ctx = c.getContext('2d');
  var stars = [];
  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    stars = [];
    for (var i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * c.width,
        y: Math.random() * c.height,
        r: Math.random() * 1.3 + 0.2,
        o: Math.random() * 0.7 + 0.2,
        p: Math.random() * Math.PI * 2
      });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    // Nebulosas
    var nebulas = [
      {x:c.width*0.2, y:c.height*0.3, r:250, h:260},
      {x:c.width*0.8, y:c.height*0.7, r:200, h:200},
      {x:c.width*0.5, y:c.height*0.5, r:300, h:280}
    ];
    nebulas.forEach(function(n) {
      var g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0, 'hsla(' + n.h + ',70%,45%,0.04)');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, c.width, c.height);
    });
    // Estrelas
    var t = Date.now() / 3000;
    stars.forEach(function(s) {
      s.p += 0.006;
      var o = s.o + Math.sin(s.p) * 0.2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(220,215,255,' + Math.max(0, o) + ')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();
  draw();
  window.addEventListener('resize', resize);
})();

var spinnerTexts = [
  'Consultando os mestres...',
  'Atravessando os séculos...',
  'Selecionando sabedorias...',
  'Trazendo à luz as palavras...',
  'Os guardiões estão escolhendo...'
];
var spinnerIdx = 0, spinnerTimer = null;

async function buscarReflexoes() {
  var btnB = document.getElementById('btnBuscar');
  var btnN = document.getElementById('btnNova');
  var spinner = document.getElementById('spinnerWrap');
  var grid = document.getElementById('reflexoesGrid');
  var rodape = document.getElementById('rodape');

  btnB.disabled = true;
  btnN.disabled = true;
  spinner.classList.add('ativo');
  grid.innerHTML = '';
  rodape.classList.remove('visivel');

  spinnerTimer = setInterval(function() {
    spinnerIdx = (spinnerIdx + 1) % spinnerTexts.length;
    document.getElementById('spinnerTxt').textContent = spinnerTexts[spinnerIdx];
  }, 2000);

  // Carrega histórico dos últimos 7 dias do localStorage
  var historico = [];
  try {
    var user = JSON.parse(localStorage.getItem('akashic_user') || '{}');
    var email = user.email || 'anon';
    var chave = 'reflexoes_hist_' + email;
    var hist = JSON.parse(localStorage.getItem(chave) || '[]');
    var sete = Date.now() - 7 * 24 * 60 * 60 * 1000;
    // Remove reflexões com mais de 7 dias
    hist = hist.filter(function(h) { return h.ts > sete; });
    historico = hist.map(function(h) { return h.autor; });
    localStorage.setItem(chave, JSON.stringify(hist));
  } catch(e) {}

  try {
    var resp = await fetch('/api/reflexoes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ autores_usados: historico })
    });
    var data = await resp.json();

    clearInterval(spinnerTimer);
    spinner.classList.remove('ativo');

    if (!data.success || !data.reflexoes) throw new Error('Sem dados');

    data.reflexoes.forEach(function(r, i) {
      var card = document.createElement('div');
      card.className = 'reflexao-card';
      card.innerHTML = '<div class="reflexao-num">0' + (i+1) + '</div>'
        + '<div class="reflexao-texto">' + r.reflexao + '</div>'
        + '<div class="reflexao-autor-wrap">'
        + '<div class="reflexao-sep"></div>'
        + '<div><div class="reflexao-autor">' + r.autor + '</div>'
        + '<div class="reflexao-origem">' + (r.origem || '') + '</div></div>'
        + '</div>';
      grid.appendChild(card);
      setTimeout(function(el) { el.classList.add('visivel'); }, i * 150 + 100, card);
    });

    setTimeout(function() { rodape.classList.add('visivel'); }, 900);
    // Salva autores no histórico de 7 dias
    try {
      var user2 = JSON.parse(localStorage.getItem('akashic_user') || '{}');
      var chave2 = 'reflexoes_hist_' + (user2.email || 'anon');
      var hist2 = JSON.parse(localStorage.getItem(chave2) || '[]');
      var sete2 = Date.now() - 7 * 24 * 60 * 60 * 1000;
      hist2 = hist2.filter(function(h) { return h.ts > sete2; });
      data.reflexoes.forEach(function(r) {
        hist2.push({ autor: r.autor, ts: Date.now() });
      });
      localStorage.setItem(chave2, JSON.stringify(hist2));
    } catch(e2) {}

    btnB.style.display = 'none';
    btnN.disabled = false;

  } catch(e) {
    clearInterval(spinnerTimer);
    spinner.classList.remove('ativo');
    grid.innerHTML = '<div style="text-align:center;color:var(--muted);padding:32px;">Erro ao buscar reflexões. Tente novamente.</div>';
    btnB.disabled = false;
    btnN.disabled = false;
  }
}

window.addEventListener('DOMContentLoaded', function() { buscarReflexoes(); });
</script>
</body>
</html>
