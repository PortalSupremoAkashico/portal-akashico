<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Histórico — Portal Akáshico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #070510;
      --bg-card: rgba(18,13,38,.92);
      --border: rgba(147,109,255,.18);
      --text: #ede9ff;
      --muted: #9b94c4;
      --accent: #a78bfa;
      --accent-bright: #c4b5fd;
      --accent-dark: #6d28d9;
      --gold: #f0c96b;
      --ok: #86efac;
      --danger: #fca5a5;
      --radius: 20px;
      --radius-sm: 12px;
      --font-display: 'Cinzel', serif;
      --font-body: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); color: var(--text); background: var(--bg-deep); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    #universeCanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .container { width: min(1000px, calc(100% - 24px)); margin: 0 auto; padding: 24px 0 80px; position: relative; z-index: 1; }

    .site-header { text-align: center; padding: 32px 20px 20px; }
    .header-badge { display: inline-block; font-family: var(--font-display); font-size: .65rem; letter-spacing: .18em; color: var(--gold); border: 1px solid rgba(240,201,107,.3); border-radius: 20px; padding: 4px 14px; margin-bottom: 10px; text-transform: uppercase; }
    .site-header h1 { font-family: var(--font-display); font-size: clamp(1.2rem,3vw,1.8rem); font-weight: 600; letter-spacing: .08em; background: linear-gradient(135deg,#e0d4ff,#a78bfa,#c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); backdrop-filter: blur(20px); margin-bottom: 16px; overflow: hidden; }
    .card-body { padding: 24px 28px; }
    @media(max-width:600px){ .card-body { padding: 18px 16px; } }

    .nav-link { display: inline-flex; align-items: center; gap: 6px; font-size: .8rem; color: var(--muted); text-decoration: none; padding: 8px 14px; border: 1px solid rgba(196,181,253,.15); border-radius: 20px; transition: all .2s; }
    .nav-link:hover { color: var(--accent-bright); border-color: rgba(196,181,253,.35); }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 9px 20px; font-family: var(--font-display); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; border: 1px solid rgba(196,181,253,.2); border-radius: 20px; background: rgba(255,255,255,.03); color: var(--muted); cursor: pointer; transition: all .2s; }
    .tab.active { background: rgba(109,40,217,.35); border-color: var(--accent); color: #fff; }
    .tab:hover:not(.active) { background: rgba(139,92,246,.12); color: var(--accent-bright); }

    /* Consulta card */
    .consulta-item { background: rgba(139,92,246,.06); border: 1px solid rgba(196,181,253,.1); border-radius: var(--radius-sm); margin-bottom: 12px; overflow: hidden; transition: border-color .2s; }
    .consulta-item:hover { border-color: rgba(196,181,253,.25); }
    .consulta-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 16px; cursor: pointer; gap: 12px; }
    .consulta-pergunta { font-size: .9rem; color: var(--accent-bright); font-weight: 500; flex: 1; line-height: 1.5; }
    .consulta-meta { font-size: .72rem; color: var(--muted); white-space: nowrap; text-align: right; }
    .consulta-tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .tag { font-size: .68rem; padding: 2px 8px; border-radius: 20px; background: rgba(139,92,246,.15); border: 1px solid rgba(196,181,253,.15); color: var(--muted); }
    .consulta-body { display: none; padding: 0 16px 16px; }
    .consulta-body.open { display: block; }
    .section-label { font-family: var(--font-display); font-size: .65rem; letter-spacing: .14em; color: var(--gold); text-transform: uppercase; margin: 14px 0 6px; }
    .section-text { font-size: .85rem; color: rgba(237,233,255,.8); line-height: 1.75; white-space: pre-wrap; }
    .chevron { font-size: .75rem; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
    .chevron.open { transform: rotate(180deg); }

    /* Mentoria */
    .mentoria-msg { padding: 10px 14px; border-radius: 10px; margin-bottom: 8px; font-size: .85rem; line-height: 1.7; }
    .mentoria-msg.user { background: rgba(109,40,217,.18); border: 1px solid rgba(196,181,253,.15); color: var(--text); }
    .mentoria-msg.mentor { background: rgba(18,13,38,.8); border: 1px solid rgba(147,109,255,.15); color: rgba(237,233,255,.9); }
    .mentoria-role { font-size: .68rem; color: var(--muted); margin-bottom: 4px; letter-spacing: .08em; text-transform: uppercase; }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: .88rem; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(196,181,253,.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<canvas id="universeCanvas"></canvas>

<div class="container">
  <header class="site-header">
    <div class="header-badge">Portal Akáshico</div>
    <h1>Meu Histórico</h1>
  </header>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
    <a href="/" class="nav-link">← Portal</a>
    <span id="userGreeting" style="font-size:.82rem;color:var(--muted);"></span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tabConsultas" onclick="switchTab('consultas')">✦ Consultas</div>
    <div class="tab" id="tabMentoria" onclick="switchTab('mentoria')">⚚ Mentoria</div>
  </div>

  <!-- Conteúdo -->
  <div id="contentConsultas">
    <div class="card">
      <div class="card-body">
        <div id="consultasList">
          <div style="text-align:center;padding:40px 20px;">
            <div class="spinner"></div>
            <div style="color:var(--muted);font-size:.85rem;">Carregando consultas...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="contentMentoria" style="display:none;">
    <div class="card">
      <div class="card-body">
        <div id="mentoriaList">
          <div style="text-align:center;padding:40px 20px;">
            <div class="spinner"></div>
            <div style="color:var(--muted);font-size:.85rem;">Carregando histórico de mentoria...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Fundo cósmico (igual ao portal) ──
(function(){
  const canvas=document.getElementById('universeCanvas');
  const ctx=canvas.getContext('2d');
  let W,H,stars=[],nebulae=[],spaceships=[],starClusters=[],t=0;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;init();}
  function rand(a,b){return a+Math.random()*(b-a);}
  function init(){
    stars=[];
    const count=Math.floor((W*H)/700);
    for(let i=0;i<count;i++){const spd=rand(0.3,1.2);stars.push({x:rand(0,W),y:rand(0,H),r:rand(0.4,2),alpha:rand(0.4,1),speed:rand(0.0004,0.001),phase:rand(0,Math.PI*2),color:Math.random()<0.2?`hsl(${rand(200,280)},85%,92%)`:'#fff',dx:spd*0.7,dy:spd*0.2,isBright:false});}
    const bc=Math.floor((W*H)/90000);
    for(let i=0;i<bc;i++){const spd=rand(0.2,0.8);stars.push({x:rand(0,W),y:rand(0,H),r:rand(2.5,6),alpha:1,speed:rand(0.0005,0.0015),phase:rand(0,Math.PI*2),color:'#fff',dx:spd*0.5,dy:spd*0.15,isBright:true});}
    nebulae=[];
    const cols=[[120,70,200],[60,100,255],[200,80,160],[30,120,220]];
    for(let i=0;i<8;i++){const[r,g,b]=cols[i%cols.length];nebulae.push({x:rand(0,W),y:rand(0,H),rx:rand(W*.2,W*.45),ry:rand(H*.15,H*.35),alpha:rand(0.06,0.14),angle:rand(0,Math.PI),r,g,b,driftX:rand(-0.03,0.03),driftY:rand(-0.02,0.02),rotSpeed:rand(-0.00005,0.00005),pulseSpeed:rand(0.0003,0.0008),pulsePhase:rand(0,Math.PI*2)});}
    spaceships=[];starClusters=[];
  }
  function loop(ts){t=ts;ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.5,Math.max(W,H)*.8);bg.addColorStop(0,'#0d0820');bg.addColorStop(0.4,'#060314');bg.addColorStop(1,'#020108');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    nebulae.forEach(n=>{const pulse=Math.sin(t*n.pulseSpeed+n.pulsePhase)*0.4+0.8;ctx.save();ctx.translate(n.x,n.y);ctx.rotate(n.angle);const g=ctx.createRadialGradient(0,0,0,0,0,n.rx),a=n.alpha*pulse;g.addColorStop(0,`rgba(${n.r},${n.g},${n.b},${a})`);g.addColorStop(1,`rgba(${n.r},${n.g},${n.b},0)`);ctx.scale(1,n.ry/n.rx);ctx.beginPath();ctx.arc(0,0,n.rx,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.restore();n.x+=n.driftX;n.y+=n.driftY;n.angle+=n.rotSpeed;});
    stars.forEach(s=>{s.x+=s.dx;s.y+=s.dy;if(s.x<-2)s.x=W+2;if(s.x>W+2)s.x=-2;if(s.y<-2)s.y=H+2;if(s.y>H+2)s.y=-2;if(s.isBright){ctx.shadowBlur=20;ctx.shadowColor='rgba(255,255,255,1)';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.globalAlpha=1;ctx.fill();ctx.shadowBlur=0;}else{const fl=Math.sin(t*s.speed*1000+s.phase)*0.35+0.65;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.color;ctx.globalAlpha=s.alpha*fl;ctx.fill();ctx.globalAlpha=1;}});
    const v=ctx.createRadialGradient(W*.5,H*.5,H*.2,W*.5,H*.5,Math.max(W,H)*.75);v.addColorStop(0,'transparent');v.addColorStop(1,'rgba(2,1,8,0.72)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
    requestAnimationFrame(loop);
  }
  window.addEventListener('resize',resize);resize();requestAnimationFrame(loop);
})();

// ── Storage ──
const STORAGE_KEY_USER = 'akashic_user';
function getUser() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY_USER)||'{}'); } catch { return {}; } }

// ── Tabs ──
function switchTab(tab) {
  document.getElementById('contentConsultas').style.display = tab === 'consultas' ? '' : 'none';
  document.getElementById('contentMentoria').style.display  = tab === 'mentoria'  ? '' : 'none';
  document.getElementById('tabConsultas').className = 'tab' + (tab === 'consultas' ? ' active' : '');
  document.getElementById('tabMentoria').className  = 'tab' + (tab === 'mentoria'  ? ' active' : '');
}

// ── Toggle de seção da consulta ──
function toggleConsulta(id) {
  const body    = document.getElementById('body-' + id);
  const chevron = document.getElementById('chev-' + id);
  const isOpen  = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

// ── Carrega consultas ──
async function loadConsultas(email) {
  const el = document.getElementById('consultasList');
  try {
    const resp = await fetch(`/api/consultas?email=${encodeURIComponent(email)}`);
    const data = await resp.json();

    if (!data.success || !data.consultas || data.consultas.length === 0) {
      el.innerHTML = '<div class="empty">Nenhuma consulta registrada ainda.<br>Faça sua primeira consulta no Portal.</div>';
      return;
    }

    el.innerHTML = data.consultas.map((c, i) => {
      const data_fmt = c.created_at ? new Date(c.created_at).toLocaleString('pt-BR') : '—';
      const sections = [
        { key: 'revelation',          label: '✶ Revelação' },
        { key: 'earth_future',         label: '⚚ Futuro' },
        { key: 'other_civilizations',  label: '⎈ Mentores' },
        { key: 'technology_future',    label: '⟡ Coexistência' },
        { key: 'warning',              label: '⚠ Advertência' },
        { key: 'action',               label: '↟ Ação' }
      ];

      const sectionsHtml = sections
        .filter(s => c[s.key])
        .map(s => `
          <div class="section-label">${s.label}</div>
          <div class="section-text">${escapeHtml(c[s.key])}</div>
        `).join('');

      return `
        <div class="consulta-item">
          <div class="consulta-header" onclick="toggleConsulta('${i}')">
            <div>
              <div class="consulta-pergunta">"${escapeHtml((c.pergunta||'').slice(0,120))}${(c.pergunta||'').length>120?'…':''}"</div>
              <div class="consulta-tags">
                ${c.tema  ? `<span class="tag">${escapeHtml(c.tema)}</span>` : ''}
                ${c.estado ? `<span class="tag">${escapeHtml(c.estado)}</span>` : ''}
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
              <div class="consulta-meta">${data_fmt}</div>
              <div class="chevron" id="chev-${i}">▾</div>
            </div>
          </div>
          <div class="consulta-body" id="body-${i}">
            <div style="border-top:1px solid rgba(196,181,253,.08);margin-bottom:12px;"></div>
            <div class="section-label" style="margin-top:0;">✦ Pergunta completa</div>
            <div class="section-text">${escapeHtml(c.pergunta||'')}</div>
            ${sectionsHtml}
          </div>
        </div>
      `;
    }).join('');

  } catch (err) {
    el.innerHTML = `<div class="empty">Erro ao carregar consultas.<br>${err.message}</div>`;
  }
}

// ── Carrega histórico de mentoria do Supabase ──
async function loadMentoria(email) {
  const el = document.getElementById('mentoriaList');
  try {
    const resp = await fetch(`/api/mentorias?email=${encodeURIComponent(email)}`);
    const data = await resp.json();

    if (!data.success || !data.messages || data.messages.length === 0) {
      el.innerHTML = '<div class="empty">Nenhuma sessão de mentoria registrada ainda.</div>';
      return;
    }

    // Agrupa por consulta (tema/pergunta)
    let currentTema = null;
    let html = '';

    data.messages.forEach(m => {
      if (m.consulta_tema && m.consulta_tema !== currentTema) {
        currentTema = m.consulta_tema;
        html += `
          <div style="margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(196,181,253,.1);">
            <div style="font-family:var(--font-display);font-size:.68rem;letter-spacing:.12em;color:var(--gold);">SESSÃO — ${escapeHtml(currentTema)}</div>
            ${m.consulta_pergunta ? `<div style="font-size:.78rem;color:rgba(196,181,253,.5);margin-top:3px;">"${escapeHtml(m.consulta_pergunta.slice(0,80))}${m.consulta_pergunta.length>80?'…':''}"</div>` : ''}
          </div>
        `;
      }
      html += `
        <div class="mentoria-msg ${m.role === 'user' ? 'user' : 'mentor'}">
          <div class="mentoria-role">${m.role === 'user' ? '✦ Você' : '⚚ Mentor Akáshico'}</div>
          ${escapeHtml(m.content)}
        </div>
      `;
    });

    el.innerHTML = html;

  } catch (err) {
    el.innerHTML = `<div class="empty">Erro ao carregar mentoria.<br>${err.message}</div>`;
  }
}

function escapeHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function() {
  const user = getUser();
  if (!user.email) {
    window.location.href = '/';
    return;
  }
  const firstName = (user.nome||'').trim().split(/\s+/)[0] || 'consulente';
  document.getElementById('userGreeting').textContent = firstName;

  loadConsultas(user.email);
  loadMentoria(user.email);
});
</script>
</body>
</html>
