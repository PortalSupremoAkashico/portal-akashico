<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal dos Registros Akáshicos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #05040f;
      --bg-card: rgba(14, 12, 28, 0.82);
      --bg-card-hover: rgba(20, 17, 40, 0.9);
      --border: rgba(147, 109, 255, 0.18);
      --border-glow: rgba(147, 109, 255, 0.45);
      --text: #ede9ff;
      --muted: #9b94c4;
      --accent: #a78bfa;
      --accent-bright: #c4b5fd;
      --accent-dark: #6d28d9;
      --gold: #f0c96b;
      --gold-dim: rgba(240, 201, 107, 0.6);
      --ok: #86efac;
      --danger: #fca5a5;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-card: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
      --shadow-glow: 0 0 40px rgba(147, 109, 255, 0.15);
      --font-display: 'Cinzel', serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background-color: var(--bg-deep);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero-content {
      max-width: 800px;
      text-align: center;
      animation: fadeInUp 1.5s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cosmic-symbol {
      font-size: 80px;
      margin-bottom: 20px;
      color: var(--gold);
    }

    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 20px var(--gold-dim)); }
      50% { filter: drop-shadow(0 0 40px var(--gold)); }
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent-bright), var(--accent), var(--accent-bright));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 18px;
      color: var(--gold);
      margin-bottom: 40px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0.9;
    }

    .divider {
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 30px auto;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '✦';
      position: absolute;
      color: var(--accent);
      font-size: 12px;
      top: -7px;
    }

    .divider::before { left: -15px; }
    .divider::after { right: -15px; }

    .description {
      font-size: 18px;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 25px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .description strong {
      color: var(--accent-bright);
      font-weight: 600;
    }

    .highlight-box {
      background: rgba(167, 139, 250, 0.1);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 25px;
      margin: 30px 0;
      backdrop-filter: blur(10px);
    }

    .highlight-box p {
      font-size: 17px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 0;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }

    .feature {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 20px;
      transition: all 0.3s ease;
    }

    .feature:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-glow);
      transform: translateY(-5px);
      box-shadow: var(--shadow-glow);
    }

    .feature-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .feature h3 {
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--accent-bright);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .feature p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .cta-button {
      display: inline-block;
      margin-top: 40px;
      padding: 20px 60px;
      font-size: 20px;
      font-weight: 600;
      font-family: var(--font-display);
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border: 2px solid var(--accent-bright);
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .cta-button:hover::before {
      width: 300px;
      height: 300px;
    }

    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 60px rgba(167, 139, 250, 0.5);
      border-color: var(--gold);
    }

    .cta-button span {
      position: relative;
      z-index: 1;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 30px 20px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .cosmic-symbol { font-size: 60px; }
      h1 { font-size: 32px; }
      .subtitle { font-size: 14px; }
      .description { font-size: 16px; }
      .cta-button { 
        padding: 16px 40px; 
        font-size: 16px; 
      }
      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="universeCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
  <script>
  (function(){
    const cv = document.getElementById('soberanaCanvas');
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const CX = 80, CY = 80, R = 42;
    let t = 0;

    function drawSphere() {
      const grd = ctx.createRadialGradient(CX-12,CY-15,2,CX,CY,R);
      grd.addColorStop(0,'#f0e8ff'); grd.addColorStop(0.18,'#b080ff');
      grd.addColorStop(0.5,'#5010b0'); grd.addColorStop(0.8,'#2d0a6e'); grd.addColorStop(1,'#080318');
      ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
      const hi = ctx.createRadialGradient(CX-12,CY-15,1,CX-7,CY-10,12);
      hi.addColorStop(0,'rgba(245,240,255,0.36)'); hi.addColorStop(1,'rgba(245,240,255,0)');
      ctx.beginPath(); ctx.ellipse(CX-8,CY-12,11,7,-0.3,0,Math.PI*2); ctx.fillStyle=hi; ctx.fill();
    }

    function drawGrid() {
      ctx.save();
      ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.clip();
      ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=0.6; ctx.setLineDash([]);
      ctx.beginPath(); ctx.ellipse(CX,CY,R*0.85,R*0.2,0,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(CX,CY,R*0.19,R,0,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    function drawOrbit(angle, rx, ry, color, lw, dash) {
      ctx.save(); ctx.translate(CX,CY); ctx.rotate(angle);
      ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
      ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.setLineDash(dash||[]); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }

    function orbitDot(angle, rx, ry, da, r, color, glow) {
      ctx.save(); ctx.translate(CX,CY); ctx.rotate(angle);
      const ox=Math.cos(da)*rx, oy=Math.sin(da)*ry;
      if (glow) {
        const g=ctx.createRadialGradient(ox,oy,0,ox,oy,r*3);
        g.addColorStop(0,color); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(ox,oy,r*3,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(ox,oy,r,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
      ctx.restore();
    }

    function drawCruz(side) {
      const sy=side==='top'?-1:1, py=CY+sy*R;
      const col=side==='top'?'rgba(240,201,107,0.95)':'rgba(196,181,253,0.8)';
      ctx.strokeStyle=col; ctx.lineWidth=side==='top'?1.8:1.4; ctx.lineCap='round'; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(CX-7,py); ctx.lineTo(CX+7,py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(CX,py-5); ctx.lineTo(CX,py+5); ctx.stroke();
    }

    function drawCenter() {
      const pulse=0.7+0.3*Math.sin(t*2.5), r1=7*pulse;
      const g1=ctx.createRadialGradient(CX,CY,0,CX,CY,r1);
      g1.addColorStop(0,'rgba(255,252,200,0.5)'); g1.addColorStop(1,'rgba(240,201,107,0)');
      ctx.beginPath(); ctx.arc(CX,CY,r1,0,Math.PI*2); ctx.fillStyle=g1; ctx.fill();
      ctx.beginPath(); ctx.arc(CX,CY,5.5,0,Math.PI*2);
      ctx.strokeStyle='rgba(240,201,107,0.9)'; ctx.lineWidth=1.4; ctx.stroke();
      const gc=ctx.createRadialGradient(CX-1,CY-1,0,CX,CY,4);
      gc.addColorStop(0,'rgba(255,252,200,0.95)'); gc.addColorStop(1,'rgba(240,180,40,0.85)');
      ctx.beginPath(); ctx.arc(CX,CY,3.8,0,Math.PI*2); ctx.fillStyle=gc; ctx.fill();
      ctx.beginPath(); ctx.arc(CX,CY,1.5,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
    }

    function frame() {
      ctx.clearRect(0,0,160,160);
      const haloR=R+18+3*Math.sin(t*1.2);
      const hg=ctx.createRadialGradient(CX,CY,R+6,CX,CY,haloR);
      hg.addColorStop(0,'rgba(139,92,246,0.25)'); hg.addColorStop(1,'rgba(139,92,246,0)');
      ctx.beginPath(); ctx.arc(CX,CY,haloR,0,Math.PI*2); ctx.fillStyle=hg; ctx.fill();

      ctx.save();
      ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=10; ctx.shadowOffsetX=4; ctx.shadowOffsetY=5;
      ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.01)'; ctx.fill();
      ctx.restore();

      drawSphere(); drawGrid();

      const rx=R+5, ry=11;
      drawOrbit(0,           rx,ry,'rgba(240,201,107,0.9)', 2.0,null);
      drawOrbit(Math.PI/3,   rx,ry,'rgba(196,181,253,0.8)', 1.6,null);
      drawOrbit(-Math.PI*0.3,rx,ry,'rgba(196,181,253,0.5)', 1.0,null);
      drawOrbit(Math.PI/6,   rx,ry,'rgba(196,181,253,0.28)',0.7,[2,3]);

      orbitDot(0,           rx,ry,t*1.2,          4.5,'#f0c96b',            true);
      orbitDot(0,           rx,ry,t*1.2+Math.PI,  3,  'rgba(240,201,107,0.55)',false);
      orbitDot(Math.PI/3,   rx,ry,t*0.85+1.0,     3.5,'#c4b5fd',            true);
      orbitDot(Math.PI/3,   rx,ry,t*0.85+Math.PI, 2.5,'rgba(196,181,253,0.5)',false);
      orbitDot(-Math.PI*0.3,rx,ry,-t*0.6+0.8,     2.5,'#f0c96b',            false);

      const s1x=CX+32*Math.cos(-t*0.7+Math.PI/4), s1y=CY+32*Math.sin(-t*0.7+Math.PI/4)*0.5;
      const sg=ctx.createRadialGradient(s1x,s1y,0,s1x,s1y,3);
      sg.addColorStop(0,'rgba(196,181,253,0.8)'); sg.addColorStop(1,'rgba(196,181,253,0)');
      ctx.beginPath(); ctx.arc(s1x,s1y,3,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
      ctx.beginPath(); ctx.arc(s1x,s1y,1.3,0,Math.PI*2); ctx.fillStyle='#c4b5fd'; ctx.fill();

      const s2x=CX+35*Math.cos(t*0.5-Math.PI/5), s2y=CY+35*Math.sin(t*0.5-Math.PI/5)*0.45;
      const sg2=ctx.createRadialGradient(s2x,s2y,0,s2x,s2y,2.5);
      sg2.addColorStop(0,'rgba(240,201,107,0.75)'); sg2.addColorStop(1,'rgba(240,201,107,0)');
      ctx.beginPath(); ctx.arc(s2x,s2y,2.5,0,Math.PI*2); ctx.fillStyle=sg2; ctx.fill();
      ctx.beginPath(); ctx.arc(s2x,s2y,1.1,0,Math.PI*2); ctx.fillStyle='#f0c96b'; ctx.fill();

      drawCruz('top'); drawCruz('bottom'); drawCenter();
      t += 0.018;
      requestAnimationFrame(frame);
    }
    frame();
  })();
  </script>
</body>
</html>
